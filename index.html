<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuki Lab - アプリ一覧</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #0D0D0D;
            color: #ffffff;
            line-height: 1.6;
        }
        h1 {
            color: #F0C040;
            text-align: center;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        .app-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .app-card:hover {
            border-color: rgba(240, 192, 64, 0.4);
        }
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            flex-shrink: 0;
        }
        .app-info {
            flex: 1;
        }
        .app-name {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 4px 0;
        }
        .app-desc {
            color: #aaa;
            margin: 0 0 8px 0;
            font-size: 14px;
        }
        .app-links a {
            color: #F0C040;
            text-decoration: none;
            font-size: 13px;
            margin-right: 16px;
        }
        .app-links a:hover {
            text-decoration: underline;
        }
        .app-card.teal {
            border-color: rgba(0, 245, 212, 0.2);
        }
        .app-card.teal .app-links a,
        .app-card.teal .app-name {
            color: #00F5D4;
        }
        .app-card.gold {
            border-color: rgba(240, 192, 64, 0.2);
        }
        .app-card.gold .app-name {
            color: #F0C040;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 14px;
        }
        .footer a {
            color: #888;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Yuki Lab</h1>
    <p class="subtitle">アプリ一覧</p>

    <div class="app-card gold">
        <img class="app-icon" src="https://raw.githubusercontent.com/xCryptoCat/yukizo/master/assets/icon.png" alt="ユキゾウダッシュ" onerror="this.style.background='#1E2A3A';this.alt='🐘'">
        <div class="app-info">
            <p class="app-name">ユキゾウダッシュ</p>
            <p class="app-desc">地下鉄を走り抜けろ！ゾウの警察官ユキゾウと一緒にコインを集めて冒険しよう！</p>
            <div class="app-links">
                <a href="https://play.google.com/store/apps/details?id=com.yukizo.app">Google Play →</a>
                <a href="yukizo-privacy.html">プライバシーポリシー</a>
            </div>
        </div>
    </div>

    <div class="app-card teal">
        <div class="app-icon" style="background: #1a1a2a; display: flex; align-items: center; justify-content: center; font-size: 36px; border-radius: 16px;">🔍</div>
        <div class="app-info">
            <p class="app-name">探検レーダー</p>
            <p class="app-desc">神戸市内の観光スポットを探索する位置情報ベースのアプリです。</p>
            <div class="app-links">
                <a href="https://play.google.com/store">Google Play →</a>
                <a href="https://gist.github.com/xCryptoCat/90a89d5716f0610ebf90b3956e92cbf8">プライバシーポリシー</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="app-ads.txt">app-ads.txt</a>
        <br><br>
        &copy; 2026 Yuki Lab
    </div>
</body>
</html>
